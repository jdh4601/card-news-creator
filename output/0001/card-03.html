<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Card News - 3페이지</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --card-width: 1080px;
            --card-height: 1350px;
            --card-bg-black: #000000;
        }

        body {
            background-color: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            margin: 0;
            box-sizing: border-box;
        }

        .card-container {
            width: var(--card-width);
            height: var(--card-height);
            background-color: var(--card-bg-black);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #ffffff;
            /* transform: scale(0.6); transform-origin: top center; margin-bottom: -540px; */
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            background-image: url('file:///Users/jayden/Desktop/done자동화/cardnewscontent/input/0001/IMG_5721.jpeg');
            background-position: center 20%;
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.1) 0%,
                rgba(0,0,0,0.4) 40%,
                #000000 55%,
                #000000 100%
            );
        }

        .content {
            position: absolute;
            z-index: 3;
            width: 100%;
            box-sizing: border-box;
            left: 0;
            bottom: 115px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 40px;
        }

        .title {
            font-size: 58px;
            font-weight: 600;
            letter-spacing: -1.5px;
            margin: 0 0 45px 0;
        }

        .paragraph {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 40px;
        }

        .paragraph:last-child {
            margin-bottom: 0;
        }

        p {
            font-size: 40px;
            font-weight: 300;
            line-height: 1.4;
            margin: 0;
            letter-spacing: -1.2px;
            color: #f7f7f7;
        }

        .highlight {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1.2px;
            padding: 5px 18px;
            margin: 6px 0;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="bg-image"></div>
        <div class="gradient-overlay"></div>
        <div class="content">
            <h2 class="title">옥상에서 바다까지</h2>

            <div class="paragraph">
                <p>학교 옥상에서 기름을 풀어</p>
                <p>로봇을 테스트하기 시작했어요.</p>
            </div>

            <div class="paragraph">
                <p>시설 관리팀에게 쫓겨나기도 하고</p>
                <p>낚시꾼에게 도움을 구걸하기도 했죠.</p>
            </div>

            <div class="paragraph">
                <p>인천 대교 밑에서 테스트하다가</p>
                <div>
                    <span class="highlight">"로봇 몇 개를 떠나보내기도 했어요."</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
